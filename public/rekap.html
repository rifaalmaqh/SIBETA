<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Rekap Data | SiBeta</title>
    <link rel="stylesheet" href="css/rekap.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  </head>
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-top">
        <img src="assets/logo_sibeta.png" alt="SiBeta" class="logo-main" />
        <h2>SiBeta</h2>
      </div>
      <div class="sidebar-bottom">
        <nav>
                <a href="dashboard.html">
          <i class="bi bi-house-door-fill"></i> Dashboard
        </a>

        <a href="welcome.html">
          <i class="bi bi-person-plus-fill"></i> Input Tamu
        </a>

        <a href="rekap.html" class="active">
          <i class="bi bi-bar-chart-fill"></i> Rekap
        </a>

        <a href="about.html">
          <i class="bi bi-info-circle-fill"></i> About
        </a>

        <a href="/logout" class="logout">
          <i class="bi bi-box-arrow-right"></i> Logout
        </a>
        </nav>
      </div>
    </aside>

    <main class="main">
      <header class="header">
        <h1>Rekap Kunjungan</h1>
        <p>Data tamu berdasarkan rentang tanggal</p>
      </header>

      <section class="filter-section">
        <div class="filter-group">
          <label for="startDate">Tanggal Mulai</label>
          <input type="date" id="startDate" />
        </div>

        <div class="filter-group">
          <label for="endDate">Tanggal Akhir</label>
          <input type="date" id="endDate" />
        </div>

        <button class="btn-primary" id="btnFilter">Tampilkan</button>
      </section>

      <section class="table-section">
        <h2>Hasil Rekap</h2>

        <table>
          <thead>
            <tr>
              <th>Nama</th>
              <th>Instansi</th>
              <th>Keperluan</th>
              <th>Tanggal</th>
              <th>Jam Datang</th>
              <th>Jam Pulang</th>
              <th>Status</th>
              <th>Aksi</th>
            </tr>
          </thead>

          <tbody id="rekapTable">
            <tr>
              <td colspan="8" class="loading">Silakan pilih tanggal lalu klik Tampilkan</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
    <script src="js/rekap.js"></script>
    <script src="logo.js"></script>
  </body>

  <div class="logo-wrapper">
    <img src="assets/logo_smkn1.png" alt="SMKN1" />
    <img src="assets/logo_sija.png" alt="SIJA" />
  </div>
</html>
