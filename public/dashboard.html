<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard | SiBeta</title>
    <link rel="stylesheet" href="../css/dashboard.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-top">
        <img src="assets/logo_sibeta.png" alt="SiBeta" class="logo-main" />
        <h2>SiBeta</h2>
      </div>

      <div class="sidebar-bottom">
        <nav>
          <a href="dashboard.html" class="active">
          <i class="bi bi-house-door-fill"></i> Dashboard
        </a>

        <a href="welcome.html">
          <i class="bi bi-person-plus-fill"></i> Input Tamu
        </a>

        <a href="rekap.html">
          <i class="bi bi-bar-chart-fill"></i> Rekap
        </a>

        <a href="/logout" class="logout">
          <i class="bi bi-box-arrow-right"></i> Logout
        </a>
        </nav>
      </div>
    </aside>

    <main class="main">
      <header class="header">
        <h1>Dashboard</h1>
        <p>Data tamu hari ini</p>
      </header>

      <section class="cards">
        <div class="card">
          <h3>Total Tamu</h3>
          <p id="totalTamu">0</p>
        </div>

        <div class="card success">
          <h3>Sudah Pulang</h3>
          <p id="pulang">0</p>
        </div>

        <div class="card danger">
          <h3>Belum Pulang</h3>
          <p id="belum">0</p>
        </div>
      </section>

      <section class="table-section">
        <h2>Daftar Tamu Hari Ini</h2>

        <table>
          <thead>
            <tr>
              <th>Nama</th>
              <th>Instansi</th>
              <th>Keperluan</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="guestTable">
            <tr>
              <td colspan="4" class="loading">Memuat data...</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="../js/dashboard.js"></script>
    <script src="logo.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>

  <div class="logo-wrapper">
    <img src="assets/logo_smkn1.png" alt="SMKN1" />
    <img src="assets/logo_sija.png" alt="SIJA" />
  </div>
</html>
